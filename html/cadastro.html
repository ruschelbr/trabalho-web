<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- bootstrap: -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <header class="header p-4 w-100 d-flex align-items-center">
        <a href="index.html" class="me-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Contato</a>
        <a href="login.html" class="ms-auto me-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <form id="form-login" method="post">
        <div id="login" class="container d-flex flex-column align-items-center justify-content-center">
            <div class="row p-5">
                <p class="my-3 nome-formulario texto-escuro">Cadastro</p>
            </div>
            <div class="row p-5">
                <label for="Nome" class="my-3 texto-escuro">Nome:</label>
                <input type="text" name="nome" id="nome" class="form-input">
            </div>
            <div class="row p-5">
                <label for="email" class="my-3 texto-escuro">Email:</label>
                <input type="email" name="email" id="email" class="form-input">
            </div>
            <div class="row p-5">
                <label for="senha" class="my-3 texto-escuro">Senha:</label>
                <input type="password" name="senha" id="senha" class="form-input">
            </div>
            <div class="row p-5">
                <label for="album" class="my-3 texto-escuro">Álbum favorito:</label>
                <select name="album" id="album-favorito" class="dropdown-form">
                    <option value="sunset">Splippleman at Sunset Sound... Lost, Now Found</option>
                    <option value="night">Still Night Blue</option>
                    <option value="magic">Welcome to the Magic Room</option>
                </select>
            </div>
            <div class="row p-5">
                <label for="tipo-conta" class="my-3 texto-escuro">Tipo de conta:</label>
                <select name="tipo-conta" id="tipo-conta" class="dropdown-form">
                    <option value="fa">Fã</option>
                    <option value="empresa">Empresa</option>
                </select>
            </div>
            <div class="row p-5">
                <label for="perfil" class="my-3 texto-escuro">Foto de perfil:</label>
                <input type="file" name="perfil" id="perfil" class="form-input">
            </div>

            <div class="row p-5">
                <button class="btn mx-auto">Entrar</button>
            </div>
        </div>


    </form>

    <footer>
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="#" class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="#" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="#" class="footer-icon">
                        <img src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita">
                <img src="../img/logo.jpg" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>

</body>

</html>
