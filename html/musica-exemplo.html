<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ray Riff Machine</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/musica-exemplo.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter&family=Bigshot+One&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="header py-4 px-5 w-100 d-flex align-items-center inter">
        <a href="index.html" class="me-xs-1 me-se-3 me-lg-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="discografia.html"
            class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="sobre.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="contato.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Contato</a>
        <a href="cadastrar-album.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Cadastrar
            álbum</a>
        <a href="login.html" class=" ms-auto me-xs-1 me-sm-3 me-lg-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <main class="pagina-musica google-sans">

        <section class="musica-container">
            <div class="musica-topo">
                <div class="musica-album">
                    <img src="../img/Albun1.png" alt="Welcome to the Magic Room" class="musica-capa">
                    <p class="musica-album-nome">Welcome to the Magic Room</p>
                </div>

                <div class="musica-detalhes">
                    <h1 class="musica-titulo">X-Ray Riff Machine</h1>

                    <div class="musica-video-placeholder">
                    <iframe width="560" height="315"
                        src="https://www.youtube.com/embed/ycYCbpjG6A8?si=M_lL2nJxH6-oWNUu"
                        title="YouTube video player" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                    </iframe>
                </div>
                </div>
            </div>

            <section class="musica-comentarios">
                <h2 class="comentarios-titulo">Comentários da música</h2>

                <div class="comentario-card">
                    <div class="comentario-topo">
                        <div class="comentario-foto"></div>
                        <span class="comentario-nome">Foto X / Nome X</span>
                    </div>
                    <p class="comentario-texto">Comentário X</p>
                </div>

                <div class="comentario-card">
                    <div class="comentario-topo">
                        <div class="comentario-foto"></div>
                        <span class="comentario-nome">Foto Y / Nome Y</span>
                    </div>
                    <p class="comentario-texto">Comentário Y</p>
                </div>

                <div class="comentario-card">
                    <div class="comentario-topo">
                        <div class="comentario-foto"></div>
                        <span class="comentario-nome">Foto Z / Nome Z</span>
                    </div>
                    <p class="comentario-texto">Comentário Z</p>
                </div>

                <p class="comentarios-mais">...</p>
            </section>

            <section class="musica-novo-comentario">
                <h2 class="comentarios-titulo">Deixe o seu comentário também!</h2>

                <form action="#" method="post" class="form-comentario">
                    <textarea name="comentario" id="comentario" class="form-comentario-textarea"
                              placeholder="Digite aqui o seu comentário..." required></textarea>

                    <button type="submit" class="btn btn-comentario mt-3">
                        Comentar
                    </button>
                </form>
            </section>
        </section>

    </main>

    <footer class="google-sans">
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="https://open.spotify.com/intl-pt/artist/4dQ2640iVoRcfgmMW0BThy?si=JqEAwcLiSGq9XfVgV_EjuQ"
                       class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="https://www.youtube.com/user/splippleman" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="https://www.instagram.com/splippleman/" class="footer-icon">
                        <img id="img-instagram" src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita">
                <img src="../img/icon-rodape.png" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy mt-5">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>

</body>

</html>
