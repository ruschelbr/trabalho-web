<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- bootstrap: -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <header class="header p-4 w-100 d-flex align-items-center">
        <a href="index.html" class="me-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="" class="mx-5 texto-claro links-animacao links-header">Contato</a>
        <a href="" class="ms-auto me-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <form id="form-login" method="post">
        <div id="login" class="container d-flex flex-column align-items-center justify-content-center">
            <div class="row p-5">
                <label for="email" class="my-3">Email:</label>
                <input type="email" name="email" id="email" class="form-texto">
            </div>
            <div class="row p-5">
                <label for="senha" class="my-3">Senha:</label>
                <input type="password" name="senha" id="senha" class="form-texto">
            </div>
            <div class="row p-5">
                <div class="col d-flex align-items-center gap-2">
                    <input type="checkbox" name="lembrar" id="lembrar" class="checkbox">
                    <label for="lembrar">Lembrar-me</label>
                </div>
            </div>
            <div class="row p-5">
                <button class="btn mx-auto">Entrar</button>
            </div>
        </div>

        <div class="p-5 registrar d-flex">
            <div>
                <label class="texto-claro">Não tem uma conta?</label>
                <a href="" class="links-animacao link-registrar mx-4">Registre-se</a>
            </div>
        </div>
    </form>


    <footer>
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="#" class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="#" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="#" class="footer-icon">
                        <img src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita">
                <img src="../img/logo.jpg" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
