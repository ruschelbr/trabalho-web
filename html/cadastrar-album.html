<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Álbum</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">

    <!-- bootstrap: -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter&family=Bigshot+One&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <header class="header py-4 px-5 w-100 d-flex align-items-center inter">
        <a href="index.html" class="me-xs-1 me-se-3 me-lg-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="sobre.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Contato</a>
        <a href="login.html" class=" ms-auto me-xs-1 me-sm-3 me-lg-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <div class="form-container-wrapper d-flex justify-content-center align-items-center" style="min-height: 100vh; padding-top: 15vh; padding-bottom: 5vh;">
        <form class="form-admin inter d-flex flex-column align-items-center justify-content-center" action="adicionar-musicas.html">
            <div class="row py-0 px-5 google-sans mb-4">
                <h1 class="nome-formulario texto-escuro text-center">Cadastrar Álbum</h1>
            </div>
            
            <div class="form-group w-100 px-5 mb-4">
                <label for="nome" class="texto-escuro fw-bold mb-2 d-block">Nome:</label>
                <input type="text" name="nome" id="nome" class="form-input linha-form w-100 py-2 px-3">
            </div>
            
            <div class="form-group w-100 px-5 mb-4">
                <label for="data" class="texto-escuro fw-bold mb-2 d-block">Data de Lançamento:</label>
                <input type="text" name="data" id="data" placeholder="DD/MM/YYYY" class="form-input linha-form w-50 py-2 px-3">
            </div>
            
            <div class="form-group w-100 px-5 mb-4">
                <label for="tipo" class="texto-escuro fw-bold mb-2 d-block">Tipo:</label>
                <select name="tipo" id="tipo" class="form-input linha-form w-100 py-2 px-3" style="appearance: auto; -webkit-appearance: auto; -moz-appearance: auto; cursor: pointer;">
                    <option value="" disabled selected hidden>ex: Álbum, Single, EP, Ao vivo</option>
                    <option value="album">Álbum</option>
                    <option value="single">Single</option>
                    <option value="ep">EP</option>
                    <option value="ao-vivo">Ao vivo</option>´
                    <option value="outro">Outro</option>

                </select>
            </div>
            
            <div class="form-group w-100 px-5 mb-5">
                <label class="texto-escuro fw-bold mb-2 d-block">Capa do Álbum:</label>
                <label for="capa" class="form-input linha-form w-50 py-2 px-3 text-center cursor-pointer" style="cursor: pointer; background-color: #E8E8E8; font-weight: bold;">Upload</label>
                <input type="file" name="capa" id="capa" style="display: none;">
            </div>
            
            <div class="row py-4 px-5 w-100 d-flex justify-content-center mt-3">
                <button type="submit" class="btn fw-bold py-2 px-4 linha-form" style="width: auto !important; min-width: 200px;">Criar Álbum</button>
            </div>
        </form>
    </div>

    <footer class="google-sans">
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="https://open.spotify.com/intl-pt/artist/4dQ2640iVoRcfgmMW0BThy?si=JqEAwcLiSGq9XfVgV_EjuQ"
                        class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="https://www.youtube.com/user/splippleman" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="https://www.instagram.com/splippleman/" class="footer-icon">
                        <img src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita ">
                <img src="../img/icon-rodape.png" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy mt-5">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
