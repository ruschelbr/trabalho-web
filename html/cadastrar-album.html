<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Álbum</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">

    <!-- bootstrap: -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter&family=Bigshot+One&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <header class="header py-4 px-5 w-100 d-flex align-items-center inter">
        <a href="index.html" class="me-xs-1 me-se-3 me-lg-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="sobre.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Contato</a>
        <a href="login.html" class=" ms-auto me-xs-1 me-sm-3 me-lg-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <form id="form-login" method="post" class="inter" action="adicionar-musicas.html">
        <div id="login" class="container d-flex flex-column align-items-center justify-content-center">
            <div class="row py-0 px-5 google-sans">
                <p class="my-3 nome-formulario texto-escuro text-center" style="font-size: clamp(1.5rem, 3vw, 2.5rem) !important; white-space: nowrap;">Cadastrar Álbum</p>
            </div>
            <div class="row py-4 px-5">
                <label for="nome" class="my-3 texto-escuro">Nome:</label>
                <input type="text" name="nome" id="nome" class="form-input linha-form">
            </div>
            <div class="row py-4 px-5">
                <label for="data" class="my-3 texto-escuro">Data de Lançamento:</label>
                <input type="text" name="data" id="data" placeholder="DD/MM/YYYY" class="form-input linha-form">
            </div>
            <div class="row py-4 px-5">
                <label for="tipo" class="my-3 texto-escuro">Tipo:</label>
                <select name="tipo" id="tipo" class="dropdown-form linha-form" style="appearance: auto; -webkit-appearance: auto; -moz-appearance: auto; cursor: pointer;">
                    <option value="" disabled selected hidden>ex: Álbum, Single, EP, Ao vivo</option>
                    <option value="album">Álbum</option>
                    <option value="single">Single</option>
                    <option value="ep">EP</option>
                    <option value="ao-vivo">Ao vivo</option>
                    <option value="outro">Outro</option>
                </select>
            </div>
            <div class="row py-4 px-5">
                <label class="my-3 texto-escuro">Capa do Álbum:</label>
                <label for="capa" class="form-input linha-form text-center cursor-pointer py-1" style="cursor: pointer; background-color: #E8E8E8; font-weight: bold; width: clamp(100px, 25vw, 30vw);">Upload</label>
                <input type="file" name="capa" id="capa" style="display: none;">
            </div>
            <div class="row py-4 px-5">
                <button type="submit" class="btn mx-auto linha-form" style="width: auto !important; min-width: 200px;">Criar Álbum</button>
            </div>
        </div>
    </form>

    <footer class="google-sans">
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="https://open.spotify.com/intl-pt/artist/4dQ2640iVoRcfgmMW0BThy?si=JqEAwcLiSGq9XfVgV_EjuQ"
                        class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="https://www.youtube.com/user/splippleman" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="https://www.instagram.com/splippleman/" class="footer-icon">
                        <img src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita ">
                <img src="../img/icon-rodape.png" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy mt-5">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
