<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sobre.css">
    <link rel="stylesheet" href="../css/homepage.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitter&family=Bigshot+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=BBH+Hegarty&display=swap" rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header py-4 px-5 w-100 d-flex align-items-center inter">
        <a href="homepage.html" class="me-xs-1 me-se-3 me-lg-5"><img src="../img/logo.jpg" alt="Splippleman"></a>
        <a href="discografia.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Discografia</a>
        <a href="sobre.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Sobre</a>
        <a href="contato.html" class="mx-xs-1 mx-sm-3 mx-lg-5 texto-claro links-animacao links-header">Contato</a>
        <a href="login.html" class=" ms-auto me-xs-1 me-sm-3 me-lg-5 texto-claro links-animacao links-header">Login</a>
    </header>

    <!-- CONTAINER 1 -->
    <div class="container-home-1 d-flex flex-column">

        <div class="img-home-1">
            <img id="img-splippleman-abbey-road" src="../img/Splippleman_Abbey_Road.png" alt="Splippleman at Abbey Road"
                class="img-fluid">
        </div>
        <div class="texto-home-1">
            <div class="row row-top">
                <p id="container-home-1-this-is" class="mb-12">this is.</p>
            </div>
            <div class="row row-bottom">
                <p id="container-home-1-splippleman" class="mb-12 animacao-splippleman-home-1">SPLIPPLEMAN</p>
            </div>
        </div>
    </div>

    <!-- CONTAINER 2 -->
    <div class="container-home-2">

        <div class="carousel-wrapper">
            <div id="demo" class="carousel slide" data-bs-ride="carousel">

                <!-- Indicadores -->
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
                </div>

                <!-- Slides -->
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img id="img-carrossel-home" src="../img/album_1_carrossel.png" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img id="img-carrossel-home" src="../img/album_2_carrossel.png" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img id="img-carrossel-home" src="../img/album_3_carrossel.png" class="d-block w-100">
                    </div>
                </div>

                <!-- Controles -->
                <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>

            </div>
        </div>
    </div>

    <!-- CONTAINER 3-->
    <div class="container-home-3 py-4 px-5">

        <!-- linha de cima -->
        <div class="titulo-home-3">
            <p id="container-home-3-texto">Explore.</p>
        </div>

        <!-- linha de baixo -->
        <div class="texto-e-imagem-home-3">
            <a href="discografia.html" id="links-home-3">
            <div class="box-home-3">
                <img class="img-icones-home-3" src="../img/disk-icon.png" alt="Discografia">
                <p class="texto-home-3">Discografia</p>
            </div>
            </a>
            <a href="sobre.html" id="links-home-3">
            <div class="box-home-3">
                <img class="img-icones-home-3" src="../img/info-icon.png" alt="Sobre">
                <p class="texto-home-3">Sobre</p>
            </div>
            </a>
            <a href="contato.html" id="links-home-3">
            <div class="box-home-3">
                <img class="img-icones-home-3" src="../img/contato-icon.png" alt="Contato">
                <p class="texto-home-3">Contato</p>
            </div>
            </a>
        </div>

    </div>

    <footer class="google-sans">
        <div class="footer-conteudo">
            <div class="footer-esquerda">
                <p class="footer-logo">SPLIPPLEMAN</p>
                <div class="footer-icons d-flex align-items-center">
                    <a href="https://open.spotify.com/intl-pt/artist/4dQ2640iVoRcfgmMW0BThy?si=JqEAwcLiSGq9XfVgV_EjuQ"
                        class="footer-icon me-3">
                        <img src="../img/spotify.png" alt="Spotify">
                    </a>
                    <a href="https://www.youtube.com/user/splippleman" class="footer-icon me-3">
                        <img src="../img/youtube.png" alt="youtube">
                    </a>
                    <a href="https://www.instagram.com/splippleman/" class="footer-icon">
                        <img src="../img/instagram_512.png" alt="Instagram">
                    </a>
                </div>
            </div>
            <div class="footer-direita ">
                <img src="../img/icon-rodape.png" alt="Splippleman" class="footer-logo">
            </div>
        </div>
        <div class="footer-copy mt-5">
            <p>© 2026 Todos os direitos reservados</p>
        </div>
    </footer>

</html>
